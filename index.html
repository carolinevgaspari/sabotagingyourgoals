<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>What's Sabotaging Your Health Goals? | Quiz for Busy Moms</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --green-dark: #085041;
    --green-deep: #0F6E56;
    --text: #1a1a1a;
    --text-muted: #5a5a5a;
    --border: rgba(0,0,0,0.1);
    --bg: #fafaf8;
    --white: #ffffff;
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--green-dark);
    letter-spacing: 0.02em;
    margin-bottom: 2.5rem;
    opacity: 0.8;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 560px;
  }

  /* intro */
  .intro-eyebrow {
    display: inline-block;
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1.25rem;
  }
  .intro-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 0.75rem;
  }
  .intro-sub {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 1.75rem;
  }
  .intro-meta {
    display: flex;
    gap: 1.25rem;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .intro-meta span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
  .btn-start {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-start:hover { background: var(--green-deep); }

  /* progress */
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .progress-label { font-size: 13px; color: var(--text-muted); }
  .progress-track { flex: 1; height: 3px; background: #eee; border-radius: 2px; margin: 0 12px; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.35s ease; }

  .q-text {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    line-height: 1.35;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    text-align: left;
    padding: 13px 15px;
    margin-bottom: 9px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--white);
    cursor: pointer;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    line-height: 1.45;
    transition: border-color 0.12s, background 0.12s;
  }
  .option:hover { border-color: var(--green-mid); background: var(--green-light); }
  .option.selected { border-color: var(--green); background: var(--green-light); color: var(--green-dark); }
  .opt-letter {
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    min-width: 18px;
    margin-top: 2px;
  }
  .option.selected .opt-letter { color: var(--green-dark); }

  .nav-row { display: flex; gap: 10px; margin-top: 1.25rem; }
  .btn-next {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-next:not(:disabled):hover { background: var(--green-deep); }
  .btn-back {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 20px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: border-color 0.12s;
  }
  .btn-back:hover { border-color: #aaa; }

  /* result */
  .result-badge {
    display: inline-block;
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 0.9rem;
  }
  .result-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    line-height: 1.25;
    color: var(--text);
    margin-bottom: 0.6rem;
  }
  .result-desc {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 1.25rem;
  }
  .tips-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }
  .tips { list-style: none; margin-bottom: 1.75rem; }
  .tips li {
    display: flex;
    gap: 10px;
    font-size: 14px;
    color: var(--text-muted);
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    line-height: 1.5;
  }
  .tips li:last-child { border-bottom: none; }
  .tip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-top: 7px; flex-shrink: 0; }

  .cta-block {
    background: var(--green-light);
    border: 1px solid var(--green-mid);
    border-radius: var(--radius);
    padding: 1.5rem;
    text-align: center;
    margin-top: 0.5rem;
  }
  .cta-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--green-dark);
    margin-bottom: 0.4rem;
  }
  .cta-sub {
    font-size: 14px;
    color: var(--green-deep);
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }
  .email-field {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--green-mid);
    border-radius: 9px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text);
    margin-bottom: 0.75rem;
    outline: none;
  }
  .email-field:focus { border-color: var(--green); }
  .btn-cta {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-cta:hover { background: var(--green-deep); }
  .privacy-note { font-size: 12px; color: var(--green-deep); margin-top: 0.75rem; opacity: 0.7; }

  /* thank you */
  .ty-icon { font-size: 40px; margin-bottom: 1rem; }
  .ty-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); margin-bottom: 0.6rem; }
  .ty-sub { font-size: 15px; color: var(--text-muted); line-height: 1.65; }

  @media (max-width: 480px) {
    .card { padding: 1.75rem 1.25rem; }
    .intro-title { font-size: 24px; }
    .q-text { font-size: 19px; }
    .result-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="brand">Fitness coaching for busy moms</div>

<div class="card" id="card">
  <!-- rendered by JS -->
</div>

<script>
const questions = [
  {
    q: "When do you usually think about your health goals?",
    options: [
      "In the morning, then life takes over",
      "Late at night when I can't sleep",
      "When I see something on social media",
      "Honestly, barely at all lately"
    ]
  },
  {
    q: "What happens when you do have time to work out?",
    options: [
      "I feel too exhausted to start",
      "I don't know what to do, so I skip it",
      "I start, then something comes up",
      "I actually do it — time isn't my issue"
    ]
  },
  {
    q: "How would you describe your eating during the week?",
    options: [
      "Grabbing whatever's fast or the kids' leftovers",
      "Healthy-ish until I crash and overdo it",
      "I skip meals then overeat at night",
      "Pretty consistent but I'm not seeing results"
    ]
  },
  {
    q: "What does your inner voice say when you miss a workout?",
    options: [
      "\"I'm so lazy, I'll never stick to this\"",
      "\"I'll start fresh Monday\"",
      "\"I was too busy, it's fine\"",
      "\"What even is the point\""
    ]
  },
  {
    q: "What's the biggest thing standing between you and your goals?",
    options: [
      "Not enough time or energy",
      "No clear plan or accountability",
      "My mindset and self-doubt",
      "I've tried everything and nothing works"
    ]
  }
];

const results = [
  {
    badge: "Your saboteur: energy depletion",
    title: "You're running on empty",
    desc: "You want to prioritize your health but by the time there's a moment for yourself, you have nothing left. This isn't a willpower problem — it's a fuel and recovery problem. The fix isn't to push harder, it's to work with your energy, not against it.",
    tips: [
      "Short workouts (15–20 min) done consistently beat 1-hour sessions you dread",
      "Protein and hydration in the morning protect your energy all day",
      "Sleep is your #1 fitness tool — and it's the first thing we address together"
    ]
  },
  {
    badge: "Your saboteur: decision fatigue",
    title: "You need a system, not more motivation",
    desc: "You're not lazy — you're overwhelmed. When there's no clear plan, your brain treats every workout as another decision in an already exhausting day. The right structure eliminates that friction completely.",
    tips: [
      "A pre-made weekly plan removes the \"what do I do today?\" barrier entirely",
      "Meal prepping even one day a week changes your weekday nutrition dramatically",
      "Accountability matters more than information — you probably already know what to do"
    ]
  },
  {
    badge: "Your saboteur: self-doubt",
    title: "Your thoughts are training against you",
    desc: "All-or-nothing thinking, waiting for motivation, restarting every Monday — these patterns keep you stuck more than your schedule ever could. The good news: mindset is trainable, just like muscle.",
    tips: [
      "Progress over perfection: a 10-minute walk counts. Done beats perfect every time",
      "Missing one day doesn't erase your progress — the restart mentality does",
      "A coach gives you the outside perspective your inner critic never will"
    ]
  },
  {
    badge: "Your saboteur: wrong approach",
    title: "You've been working hard at the wrong things",
    desc: "You're not the problem — the plan is. If you've tried and tried and nothing sticks or shows results, your approach needs a reset, not your effort level. A personalized strategy changes everything.",
    tips: [
      "Generic programs aren't built for your life, your schedule, or your body",
      "Results require the right stimulus — more effort isn't always the answer",
      "The right coach builds around your real life, not a perfect version of it"
    ]
  }
];

let screen = 'intro';
let current = 0;
let answers = [];

function getResult() {
  const counts = [0,0,0,0];
  answers.forEach(a => counts[a]++);
  return counts.indexOf(Math.max(...counts));
}

const letters = ['A','B','C','D'];

function render() {
  const card = document.getElementById('card');
  if (screen === 'intro') {
    card.innerHTML = `
      <span class="intro-eyebrow">Free quiz</span>
      <h1 class="intro-title">What's sabotaging your health goals?</h1>
      <p class="intro-sub">You're busy, you care about your health, and you're still not where you want to be. This quiz helps you figure out exactly what's getting in the way — so you can finally do something about it.</p>
      <div class="intro-meta">
        <span><span class="dot"></span> 5 questions</span>
        <span><span class="dot"></span> 2 minutes</span>
        <span><span class="dot"></span> Personalized result</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">Find out what's holding me back →</button>
    `;
  } else if (screen === 'quiz') {
    const q = questions[current];
    const pct = Math.round((current / questions.length) * 100);
    card.innerHTML = `
      <div class="progress-row">
        <span class="progress-label">Question ${current + 1} of ${questions.length}</span>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="progress-label">${pct}%</span>
      </div>
      <p class="q-text">${q.q}</p>
      ${q.options.map((o,i) => `
        <button class="option ${answers[current] === i ? 'selected' : ''}" onclick="select(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span>${o}</span>
        </button>
      `).join('')}
      <div class="nav-row">
        ${current > 0 ? `<button class="btn-back" onclick="back()">← Back</button>` : ''}
        <button class="btn-next" id="nxt" onclick="next()" ${answers[current] === undefined ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'See my result →' : 'Next →'}
        </button>
      </div>
    `;
  } else if (screen === 'result') {
    const r = results[getResult()];
    card.innerHTML = `
      <span class="result-badge">${r.badge}</span>
      <h2 class="result-title">${r.title}</h2>
      <p class="result-desc">${r.desc}</p>
      <p class="tips-label">What this means for you</p>
      <ul class="tips">
        ${r.tips.map(t => `<li><span class="tip-dot"></span><span>${t}</span></li>`).join('')}
      </ul>
      <div class="cta-block">
        <h3 class="cta-title">Ready to stop guessing?</h3>
        <p class="cta-sub">Book a free 20-minute discovery call. No pitch — just a real conversation about what's in your way and what to do about it.</p>
        <input class="email-field" type="email" id="email" placeholder="Your email address" />
        <button class="btn-cta" onclick="submit()">Yes, book my free call →</button>
        <p class="privacy-note">No spam, ever. Just one email to get your call scheduled.</p>
      </div>
    `;
  } else if (screen === 'thanks') {
    card.innerHTML = `
      <div style="text-align:center; padding: 1rem 0;">
        <div class="ty-icon">🌿</div>
        <h2 class="ty-title">You're on your way.</h2>
        <p class="ty-sub">Check your inbox — you'll hear from me soon to get your call scheduled. In the meantime, know this: the fact that you took this quiz means you're ready. I'll see you soon.</p>
      </div>
    `;
  }
}

function startQuiz() { screen = 'quiz'; current = 0; answers = []; render(); }
function select(i) { answers[current] = i; render(); }
function back() { if (current > 0) { current--; render(); } }
function next() {
  if (answers[current] === undefined) return;
  if (current === questions.length - 1) { screen = 'result'; }
  else { current++; }
  render();
}
function submit() {
  const email = document.getElementById('email').value;
  if (!email || !email.includes('@')) {
    document.getElementById('email').style.borderColor = '#E24B4A';
    document.getElementById('email').placeholder = 'Please enter a valid email';
    return;
  }
  screen = 'thanks';
  render();
}

render();
</script>
</body>
</html>
